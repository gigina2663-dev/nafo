<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NAong Focus</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --purple: #9c27b0; --light-purple: #f3e5f5; --pink: #ff6b9d; --bg-gray: #f2f2f7; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: linear-gradient(135deg, #e8e0ff, #ffe2ec); height: 100dvh; display: flex; flex-direction: column; color: #333; padding: env(safe-area-inset-top) 16px 0 16px; overflow: hidden; user-select: none; }

        /* 顶部导航 */
        .app-header { display: flex; justify-content: space-between; align-items: center; height: 40px; flex-shrink: 0; }
        .app-title h1 { margin: 0; font-size: 17px; color: var(--purple); font-weight: 800; }
        .global-balance { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(5px); padding: 4px 12px; border-radius: 12px; font-weight: bold; color: var(--purple); font-size: 13px; }

        /* 核心布局 */
        .tab-view { display: none; flex: 1; flex-direction: column; min-height: 0; }
        .tab-view.active { display: flex; }

        /* TAB 1: NAong 核心页 */
        .pet-panel-huge { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 0; }
        .pet-avatar-box { width: 75vw; height: 75vw; max-width: 320px; max-height: 320px; border-radius: 50%; overflow: hidden; box-shadow: 0 10px 30px rgba(156, 39, 176, 0.2); background: #fff; border: 5px solid white; }
        .pet-avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .pet-text { font-size: 13px; font-weight: 600; color: #444; margin-top: 15px; text-align: center; }

        .controls-box { width: 100%; background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); border-radius: 20px; padding: 15px; margin-bottom: calc(55px + env(safe-area-inset-bottom)); border: 1px solid rgba(255,255,255,0.3); }
        .timer-display { font-size: 32px; font-weight: 800; color: var(--purple); text-align: center; }
        .slider { width: 100%; height: 4px; accent-color: var(--purple); margin: 10px 0; }
        .main-btn { width: 100%; height: 45px; border-radius: 22px; border: none; color: white; background: var(--purple); font-weight: bold; }

        /* 其他页面样式 */
        .card-box { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(10px); border-radius: 14px; padding: 12px; margin-bottom: 8px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: calc(50px + env(safe-area-inset-bottom)); background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .tab-item { flex: 1; border: none; background: none; color: #8e8e93; font-size: 10px; font-weight: 600; }
        .tab-item.active { color: var(--purple); }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title"><h1>NAong Focus</h1></div>
        <div class="global-balance">🍦 <span id="global-icecream">10.0</span></div>
    </div>

    <div id="view-focus" class="tab-view active">
        <div class="pet-panel-huge">
            <div class="pet-avatar-box">
                <img id="pet-img" class="pet-avatar-img" src="https://i.postimg.cc/sXL0Ydv7/naong-default.jpg">
            </div>
            <div id="pet-msg" class="pet-text">📚 准备好开始今天的考研复习了吗？</div>
        </div>
        <div class="controls-box">
            <div id="timer-text" class="timer-display">25 分钟</div>
            <input type="range" id="timer-slider" class="slider" min="5" max="120" step="5" value="25" oninput="updateSlider(this.value)">
            <button id="action-btn" class="main-btn" onclick="handleMainAction()">开启锁机专注 (25分钟)</button>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-item active" onclick="switchTab('view-focus', this)">🐾 专属陪伴</button>
        <button class="tab-item" onclick="switchTab('view-stats', this)">📊 自习日志</button>
        <button class="tab-item" onclick="switchTab('view-shop', this)">🛒 冰激凌铺</button>
    </div>

    <script>
        // 核心情绪映射逻辑
        const NAongStates = {
            defaultState: { text: "📚 准备好开始今天的考研复习了吗？", img: "https://i.postimg.cc/sXL0Ydv7/naong-default.jpg" },
            excited: { text: "🎉 任务达成！Naong 兴奋地为你鼓掌！", img: "https://i.postimg.cc/brL43YLs/naong_excited.png.png" },
            happy: { text: "🍦 太棒啦！继续保持，这是奖励你的冰激凌！", img: "https://i.postimg.cc/Vvz3q09t/naong_happy.png.jpg" },
            calm: { text: "✍️ 专注的你真好看，我会一直陪着你。", img: "https://i.postimg.cc/brqKxS0k/naong_calm.png.jpg" },
            angry: { text: "💢 警告：不要切屏，Naong 要生气了！", img: "https://i.postimg.cc/kGwLfMw4/naong_angry.png⁠.jpg" },
            sad: { text: "😭 你中途放弃了，我好伤心……", img: "https://i.postimg.cc/3N9znr9w/naong_sad.png.jpg" },
            disappointed: { text: "😞 今日进度落后，快振作起来呀！", img: "https://i.postimg.cc/1XMbJRMX/naong_disappointed.png⁠.jpg" },
            punished: { text: "💤 离家出走中！快回来呀！", img: "https://i.postimg.cc/901sJX1z/naong_punished.png⁠.jpg" }
        };

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        function updateSlider(val) {
            document.getElementById('timer-text').innerText = val + " 分钟";
            document.getElementById('action-btn').innerText = `开启锁机专注 (${val}分钟)`;
        }

        // 初始化时设置状态
        function setStatus(stateKey) {
            const status = NAongStates[stateKey];
            document.getElementById('pet-img').src = status.img;
            document.getElementById('pet-msg').innerText = status.text;
        }
        
        // 专注结束触发兴奋状态
        function triggerSuccess() {
            setStatus('excited');
            setTimeout(() => alert("🎉 任务达成！"), 500);
        }
    </script>
</body>
</html>
